spring:
  datasource:
    # Overridden by Testcontainers in integration tests; used for slice tests with @MockBean
    url: jdbc:postgresql://localhost:5432/fileshare_test
    username: fileshare
    password: fileshare_secret

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  # Disable multipart at the servlet level (clients upload directly to DO Spaces)
  servlet:
    multipart:
      enabled: false

# Use fixed test secrets so JwtService and HmacSignatureUtil can be constructed
app:
  do-spaces:
    access-key: test-access-key
    secret-key: test-secret-key
    endpoint: https://nyc3.digitaloceanspaces.com
    region: nyc3
    bucket: test-bucket
    presigned-url-ttl-minutes: 60

  jwt:
    # Must be >= 32 characters (256 bits) for HS256
    secret: test-jwt-secret-must-be-32-chars-long!!
    expiration-ms: 3600000

  hmac:
    secret: test-hmac-secret-must-be-32-chars-long!
    default-link-ttl-seconds: 3600

  upload:
    default-chunk-size-bytes: 10485760
    min-chunk-size-bytes: 5242880
    max-file-size-bytes: 53687091200

logging:
  level:
    com.fileshare: DEBUG
    org.springframework.security: WARN
    software.amazon.awssdk: WARN
